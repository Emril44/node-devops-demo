name: Docker CI Pipeline

on:
    push:
        branches: [main]

jobs:
    docker-build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_TOKEN }}

            - name: Extractg image metadata
              id: meta
              run: |
                echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

            - name: Build Docker image
              run: |
                docker build \
                  -f docker/Dockerfile \
                  -t ${{ secrets.DOCKER_USERNAME }}/node-devops-demo:${{ env.IMAGE_TAG }} \
                  -t ${{ secrets.DOCKER_USERNAME }}/node-devops-demo:latest \
                  .

            - name: Push Docker image
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/node-devops-demo:${{ env.IMAGE_TAG }}
                docker push ${{ secrets.DOCKER_USERNAME }}/node-devops-demo:latest